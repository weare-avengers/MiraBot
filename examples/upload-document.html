<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Digi - Upload Document</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                padding: 20px;
            }

            .upload-container {
                background: white;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
                padding: 40px;
                max-width: 600px;
                width: 100%;
            }

            h1 {
                text-align: center;
                color: #667eea;
                margin-bottom: 30px;
            }

            .upload-area {
                border: 3px dashed #667eea;
                border-radius: 10px;
                padding: 40px;
                text-align: center;
                cursor: pointer;
                transition: all 0.3s;
                margin-bottom: 20px;
            }

            .upload-area:hover {
                background: #f8f9ff;
                border-color: #764ba2;
            }

            .upload-area.dragover {
                background: #f0f0ff;
                border-color: #764ba2;
            }

            .upload-icon {
                font-size: 48px;
                margin-bottom: 10px;
            }

            #fileInput {
                display: none;
            }

            .file-list {
                margin: 20px 0;
            }

            .file-item {
                background: #f5f5f5;
                padding: 12px;
                border-radius: 8px;
                margin-bottom: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .upload-button {
                width: 100%;
                padding: 15px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border: none;
                border-radius: 10px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                transition: transform 0.2s;
            }

            .upload-button:hover {
                transform: scale(1.02);
            }

            .upload-button:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            .status {
                margin-top: 20px;
                padding: 15px;
                border-radius: 8px;
                display: none;
            }

            .status.success {
                background: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .status.error {
                background: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }

            .status.active {
                display: block;
            }

            .progress {
                width: 100%;
                height: 30px;
                background: #f0f0f0;
                border-radius: 15px;
                overflow: hidden;
                margin: 20px 0;
                display: none;
            }

            .progress.active {
                display: block;
            }

            .progress-bar {
                height: 100%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                transition: width 0.3s;
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <div class="upload-container">
            <h1>📚 Upload Knowledge Base</h1>

            <div
                class="upload-area"
                id="uploadArea"
                onclick="document.getElementById('fileInput').click()"
            >
                <div class="upload-icon">📄</div>
                <p><strong>Click atau drag file ke sini</strong></p>
                <p style="color: #666; margin-top: 10px">
                    Support: PDF, Word, Text
                </p>
            </div>

            <input
                type="file"
                id="fileInput"
                accept=".pdf,.doc,.docx,.txt"
                multiple
            />

            <div class="file-list" id="fileList"></div>

            <div class="progress" id="progress">
                <div class="progress-bar" id="progressBar">0%</div>
            </div>

            <button
                class="upload-button"
                id="uploadButton"
                onclick="uploadFiles()"
                disabled
            >
                Upload Document
            </button>

            <div class="status" id="status"></div>
        </div>

        <script>
            const API_URL = "http://localhost:7000/api/knowledge/upload/bulk";
            let selectedFiles = [];

            // File input change handler
            document
                .getElementById("fileInput")
                .addEventListener("change", function (e) {
                    handleFiles(e.target.files);
                });

            // Drag and drop handlers
            const uploadArea = document.getElementById("uploadArea");

            uploadArea.addEventListener("dragover", (e) => {
                e.preventDefault();
                uploadArea.classList.add("dragover");
            });

            uploadArea.addEventListener("dragleave", () => {
                uploadArea.classList.remove("dragover");
            });

            uploadArea.addEventListener("drop", (e) => {
                e.preventDefault();
                uploadArea.classList.remove("dragover");
                handleFiles(e.dataTransfer.files);
            });

            function handleFiles(files) {
                selectedFiles = Array.from(files);
                displayFileList();
                document.getElementById("uploadButton").disabled =
                    selectedFiles.length === 0;
            }

            function displayFileList() {
                const fileList = document.getElementById("fileList");
                fileList.innerHTML = "";

                selectedFiles.forEach((file, index) => {
                    const fileItem = document.createElement("div");
                    fileItem.className = "file-item";
                    fileItem.innerHTML = `
                    <span>📄 ${file.name} (${formatFileSize(file.size)})</span>
                    <button onclick="removeFile(${index})" style="background:none;border:none;cursor:pointer;font-size:20px;">❌</button>
                `;
                    fileList.appendChild(fileItem);
                });
            }

            function removeFile(index) {
                selectedFiles.splice(index, 1);
                displayFileList();
                document.getElementById("uploadButton").disabled =
                    selectedFiles.length === 0;
            }

            function formatFileSize(bytes) {
                if (bytes === 0) return "0 Bytes";
                const k = 1024;
                const sizes = ["Bytes", "KB", "MB", "GB"];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return (
                    Math.round((bytes / Math.pow(k, i)) * 100) / 100 +
                    " " +
                    sizes[i]
                );
            }

            async function uploadFiles() {
                if (selectedFiles.length === 0) return;

                const formData = new FormData();
                selectedFiles.forEach((file) => {
                    formData.append("files", file);
                });

                // Show progress
                document.getElementById("progress").classList.add("active");
                document.getElementById("uploadButton").disabled = true;
                hideStatus();

                try {
                    const xhr = new XMLHttpRequest();

                    // Progress handler
                    xhr.upload.addEventListener("progress", (e) => {
                        if (e.lengthComputable) {
                            const percentComplete = Math.round(
                                (e.loaded / e.total) * 100,
                            );
                            updateProgress(percentComplete);
                        }
                    });

                    // Complete handler
                    xhr.addEventListener("load", () => {
                        if (xhr.status === 200) {
                            const data = JSON.parse(xhr.responseText);
                            if (data.success) {
                                showStatus(
                                    `✅ Berhasil upload ${data.successCount} dari ${data.totalFiles} file!`,
                                    "success",
                                );
                                selectedFiles = [];
                                displayFileList();
                            } else {
                                showStatus("❌ Upload gagal", "error");
                            }
                        } else {
                            showStatus(
                                "❌ Server error: " + xhr.status,
                                "error",
                            );
                        }
                        document
                            .getElementById("progress")
                            .classList.remove("active");
                        document.getElementById("uploadButton").disabled =
                            false;
                    });

                    // Error handler
                    xhr.addEventListener("error", () => {
                        showStatus(
                            "❌ Tidak dapat terhubung ke server",
                            "error",
                        );
                        document
                            .getElementById("progress")
                            .classList.remove("active");
                        document.getElementById("uploadButton").disabled =
                            false;
                    });

                    xhr.open("POST", API_URL);
                    xhr.send(formData);
                } catch (error) {
                    console.error("Error:", error);
                    showStatus("❌ Upload error: " + error.message, "error");
                    document
                        .getElementById("progress")
                        .classList.remove("active");
                    document.getElementById("uploadButton").disabled = false;
                }
            }

            function updateProgress(percent) {
                const progressBar = document.getElementById("progressBar");
                progressBar.style.width = percent + "%";
                progressBar.textContent = percent + "%";
            }

            function showStatus(message, type) {
                const status = document.getElementById("status");
                status.textContent = message;
                status.className = "status " + type + " active";
            }

            function hideStatus() {
                const status = document.getElementById("status");
                status.classList.remove("active");
            }
        </script>
    </body>
</html>
